name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set build metadata
        run: |
          echo "VITE_APP_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "VITE_COMMIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "VITE_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_API_KEY=${{ vars.VITE_FIREBASE_API_KEY || secrets.VITE_FIREBASE_API_KEY || 'AIzaSyDB6IgLY2PV58Tl9dmK8rN1Vox9FeWlylI' }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ vars.VITE_FIREBASE_AUTH_DOMAIN || secrets.VITE_FIREBASE_AUTH_DOMAIN || 'on-da-stack-simulator.firebaseapp.com' }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_DATABASE_URL=${{ vars.VITE_FIREBASE_DATABASE_URL || secrets.VITE_FIREBASE_DATABASE_URL || 'https://on-da-stack-simulator-default-rtdb.firebaseio.com' }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_PROJECT_ID=${{ vars.VITE_FIREBASE_PROJECT_ID || secrets.VITE_FIREBASE_PROJECT_ID || 'on-da-stack-simulator' }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_APP_ID=${{ vars.VITE_FIREBASE_APP_ID || secrets.VITE_FIREBASE_APP_ID || '1:570911169329:web:3a5283469dbc6a9b562e10' }}" >> "$GITHUB_ENV"

      - name: Build for GitHub Pages
        run: npx vite build --config vite.ghpages.config.ts

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-ghpages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
